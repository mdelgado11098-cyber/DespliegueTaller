<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Martín Delgado - Taller de Despliegue</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --accent: #6c5ce7;
            --accent2: #a29bfe;
            --accent3: #00cec9;
            --text: #e8e8f0;
            --text-dim: #7a7a90;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated background */
        .bg-grid {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image:
                linear-gradient(rgba(108, 92, 231, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(108, 92, 231, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 0;
            animation: float 8s ease-in-out infinite;
        }

        .glow-orb.one {
            width: 500px; height: 500px;
            background: rgba(108, 92, 231, 0.15);
            top: -100px; right: -100px;
            animation-delay: 0s;
        }

        .glow-orb.two {
            width: 400px; height: 400px;
            background: rgba(0, 206, 201, 0.1);
            bottom: -100px; left: -100px;
            animation-delay: -4s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -30px) scale(1.05); }
        }

        .container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        /* Main card */
        .card {
            background: linear-gradient(135deg, rgba(18, 18, 26, 0.9), rgba(18, 18, 26, 0.7));
            border: 1px solid rgba(108, 92, 231, 0.2);
            border-radius: 24px;
            padding: 60px 50px;
            max-width: 600px;
            width: 100%;
            backdrop-filter: blur(20px);
            box-shadow:
                0 0 0 1px rgba(108, 92, 231, 0.1),
                0 20px 60px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            animation: cardIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(40px);
        }

        @keyframes cardIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(108, 92, 231, 0.15);
            border: 1px solid rgba(108, 92, 231, 0.3);
            border-radius: 100px;
            padding: 8px 18px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--accent2);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 30px;
            animation: fadeIn 0.8s 0.3s both;
        }

        .badge::before {
            content: '';
            width: 8px; height: 8px;
            background: var(--accent3);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0, 206, 201, 0.4); }
            50% { opacity: 0.8; box-shadow: 0 0 0 8px rgba(0, 206, 201, 0); }
        }

        .name {
            font-size: 48px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff 0%, var(--accent2) 50%, var(--accent3) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: fadeIn 0.8s 0.5s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--accent3));
            border-radius: 2px;
            margin: 24px 0;
            animation: fadeIn 0.8s 0.7s both;
        }

        .info-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            animation: fadeIn 0.8s 0.9s both;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            transition: all 0.3s ease;
        }

        .info-item:hover {
            background: rgba(108, 92, 231, 0.08);
            border-color: rgba(108, 92, 231, 0.2);
            transform: translateX(6px);
        }

        .info-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .info-item:nth-child(1) .info-icon {
            background: rgba(108, 92, 231, 0.2);
        }
        .info-item:nth-child(2) .info-icon {
            background: rgba(0, 206, 201, 0.2);
        }
        .info-item:nth-child(3) .info-icon {
            background: rgba(253, 203, 110, 0.2);
        }

        .info-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 2px;
        }

        .info-value {
            font-size: 18px;
            font-weight: 600;
            color: var(--text);
        }

        .footer-text {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-dim);
            text-align: center;
            letter-spacing: 0.5px;
            animation: fadeIn 0.8s 1.1s both;
        }

        .server-tag {
            display: inline-block;
            background: rgba(0, 206, 201, 0.1);
            border: 1px solid rgba(0, 206, 201, 0.2);
            color: var(--accent3);
            padding: 4px 12px;
            border-radius: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            margin-top: 8px;
        }

        @media (max-width: 600px) {
            .card { padding: 40px 28px; }
            .name { font-size: 36px; }
            .info-value { font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="glow-orb one"></div>
    <div class="glow-orb two"></div>

    <div class="container">
        <div class="card">
            <div class="badge">Universidad ORT Uruguay</div>
            <h1 class="name">Martín Delgado</h1>
            <div class="divider"></div>
            <div class="info-grid">
                <div class="info-item">
                    <div class="info-icon">🎓</div>
                    <div>
                        <div class="info-label">Número de estudiante</div>
                        <div class="info-value">314363</div>
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-icon">👥</div>
                    <div>
                        <div class="info-label">Grupo</div>
                        <div class="info-value">ENE26 - TDA - N1.5C</div>
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-icon">📚</div>
                    <div>
                        <div class="info-label">Materia</div>
                        <div class="info-value">Taller de Despliegue de Aplicaciones</div>
                    </div>
                </div>
            </div>
            <div class="footer-text">
                Obligatorio — Febrero 2026
                <br>
                <span class="server-tag" id="serverTag"><!-- Nombre del servidor --></span>
            </div>
        </div>
    </div>
</body>
</html>
